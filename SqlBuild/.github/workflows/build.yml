name: Java CI

on:
  push:
    branches: [ "main" ]

  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        java-version: [17, 21, 25]  # Test on multiple JDK versions
      fail-fast: false

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK ${{ matrix.java-version }}
      uses: actions/setup-java@v4
      with:
        java-version: ${{ matrix.java-version }}
        distribution: 'temurin'
    
    - name: Build with Maven
      run: mvn clean compile

# TODO: Add tests on build for GitHub actions
#    - name: Run tests (if any)
#      run: mvn test
      
    - name: Create JAR
      run: mvn package
      
    - name: Upload JAR artifact
      uses: actions/actions/upload-artifact@v4
      with:
        name: SqlBuild-JDK${{ matrix.java-version }}
        path: target/*.jar